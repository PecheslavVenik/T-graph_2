spring.datasource.url=jdbc:duckdb:./data/graph_local.db
spring.datasource.driver-class-name=org.duckdb.DuckDBDriver
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1

# Local profile defaults to SQL fallback to avoid extension issues during development
graph.duckpgq.force-fallback=true
