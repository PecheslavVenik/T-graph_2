openapi: 3.1.0
info:
  title: Graph Explorer API
  version: 1.0.0
  description: API for 1-hop expansion, shortest path, dictionary and graph export.
servers:
  - url: /api/v1
paths:
  /graph/expand:
    post:
      summary: 1-hop expansion from seed identifiers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphExpandRequest'
      responses:
        '200':
          description: Expanded graph
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphExpandResponse'
        '503':
          description: DuckPGQ is required but unavailable
  /graph/shortest-path:
    post:
      summary: Find shortest path between two nodes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShortestPathRequest'
      responses:
        '200':
          description: Shortest path graph
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShortestPathResponse'
        '404':
          description: Path not found
        '503':
          description: DuckPGQ is required but unavailable
  /graph/dictionary:
    get:
      summary: Get edge/status dictionary for UI legend
      responses:
        '200':
          description: Dictionary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphDictionaryResponse'
  /graph/export:
    post:
      summary: Export rendered graph as JSON or CSV
      parameters:
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [JSON, CSV]
            default: JSON
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphExportRequest'
      responses:
        '200':
          description: File payload
          content:
            application/json:
              schema:
                type: object
            text/csv:
              schema:
                type: string
components:
  schemas:
    GraphExpandRequest:
      type: object
      required: [seeds, direction]
      properties:
        seeds:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/SeedRef'
        edgeTypes:
          type: array
          maxItems: 64
          items:
            type: string
            minLength: 1
        direction:
          $ref: '#/components/schemas/Direction'
        maxNeighborsPerSeed:
          type: integer
          minimum: 1
          maximum: 1000
        maxNodes:
          type: integer
          minimum: 1
          maximum: 1000
        maxEdges:
          type: integer
          minimum: 1
          maximum: 5000
        includeAttributes:
          type: boolean
        existingGraph:
          $ref: '#/components/schemas/GraphEnvelope'
    GraphExpandResponse:
      type: object
      required: [nodes, edges, meta]
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/GraphNode'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/GraphEdge'
        meta:
          $ref: '#/components/schemas/GraphMeta'
    GraphEnvelope:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/GraphNode'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/GraphEdge'
        meta:
          $ref: '#/components/schemas/GraphMeta'
    ShortestPathRequest:
      type: object
      required: [source, target, direction]
      properties:
        source:
          $ref: '#/components/schemas/SeedRef'
        target:
          $ref: '#/components/schemas/SeedRef'
        edgeTypes:
          type: array
          maxItems: 64
          items:
            type: string
            minLength: 1
        direction:
          $ref: '#/components/schemas/Direction'
        maxDepth:
          type: integer
          minimum: 1
          maximum: 10
    ShortestPathResponse:
      type: object
      required: [path, nodes, edges, meta]
      properties:
        path:
          $ref: '#/components/schemas/Path'
        nodes:
          type: array
          minItems: 1
          maxItems: 1000
          items:
            $ref: '#/components/schemas/GraphNode'
        edges:
          type: array
          maxItems: 5000
          items:
            $ref: '#/components/schemas/GraphEdge'
        meta:
          $ref: '#/components/schemas/GraphMeta'
    GraphExportRequest:
      type: object
      required: [nodes, edges]
      properties:
        nodes:
          type: array
          minItems: 1
          maxItems: 1000
          items:
            $ref: '#/components/schemas/GraphNode'
        edges:
          type: array
          maxItems: 5000
          items:
            $ref: '#/components/schemas/GraphEdge'
        meta:
          $ref: '#/components/schemas/GraphMeta'
    GraphDictionaryResponse:
      type: object
      required: [edgeTypes, nodeStatuses, styleHints]
      properties:
        edgeTypes:
          type: array
          items:
            type: string
        nodeStatuses:
          type: array
          items:
            type: string
        styleHints:
          type: object
          additionalProperties:
            type: string
    SeedRef:
      type: object
      required: [type, value]
      properties:
        type:
          $ref: '#/components/schemas/SeedType'
        value:
          type: string
          minLength: 1
    SeedType:
      type: string
      enum: [PARTY_RK, PERSON_ID, PHONE_NO, NODE_ID]
    Direction:
      type: string
      enum: [OUTBOUND, INBOUND, BOTH]
    GraphNode:
      type: object
      required: [nodeId, displayName]
      properties:
        nodeId:
          type: string
          minLength: 1
        displayName:
          type: string
          minLength: 1
        identifiers:
          type: object
          additionalProperties:
            type: string
        statuses:
          type: array
          items:
            type: string
        attributes:
          type: object
          additionalProperties: true
    GraphEdge:
      type: object
      required: [edgeId, fromNodeId, toNodeId, type, directed]
      properties:
        edgeId:
          type: string
          minLength: 1
        fromNodeId:
          type: string
          minLength: 1
        toNodeId:
          type: string
          minLength: 1
        type:
          type: string
          minLength: 1
        directed:
          type: boolean
        weight:
          type: number
        attributes:
          type: object
          additionalProperties: true
    GraphMeta:
      type: object
      required: [truncated, executionMs, source]
      properties:
        truncated:
          type: boolean
        executionMs:
          type: integer
        source:
          type: string
          enum: [DUCKPGQ, SQL_FALLBACK]
    Path:
      type: object
      required: [orderedNodeIds, orderedEdgeIds, hopCount]
      properties:
        orderedNodeIds:
          type: array
          items:
            type: string
        orderedEdgeIds:
          type: array
          items:
            type: string
        hopCount:
          type: integer
