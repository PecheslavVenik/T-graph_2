spring.application.name=graph_api_v2

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:duckdb:./data/graph_local.db}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.duckdb.DuckDBDriver}
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:2}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:1}
spring.datasource.hikari.auto-commit=${SPRING_DATASOURCE_HIKARI_AUTO_COMMIT:true}
spring.datasource.hikari.data-source-properties.allow_unsigned_extensions=${SPRING_DATASOURCE_ALLOW_UNSIGNED_EXTENSIONS:true}

spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:true}
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:true}

graph.default-max-neighbors-per-seed=${GRAPH_DEFAULT_MAX_NEIGHBORS_PER_SEED:50}
graph.default-max-nodes=${GRAPH_DEFAULT_MAX_NODES:300}
graph.default-max-edges=${GRAPH_DEFAULT_MAX_EDGES:500}
graph.default-max-depth=${GRAPH_DEFAULT_MAX_DEPTH:6}
graph.max-expand-candidate-edges=${GRAPH_MAX_EXPAND_CANDIDATE_EDGES:10000}
graph.hub-penalty-percent=${GRAPH_HUB_PENALTY_PERCENT:35}
graph.cors.allowed-origins=${GRAPH_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
graph.cors.allowed-methods=${GRAPH_CORS_ALLOWED_METHODS:GET,POST,OPTIONS}
graph.cors.allowed-headers=${GRAPH_CORS_ALLOWED_HEADERS:*}
graph.cors.max-age-seconds=${GRAPH_CORS_MAX_AGE_SECONDS:3600}

graph.duckpgq.enabled=${GRAPH_DUCKPGQ_ENABLED:true}
graph.duckpgq.auto-load=${GRAPH_DUCKPGQ_AUTO_LOAD:true}
graph.duckpgq.prefer-latest=${GRAPH_DUCKPGQ_PREFER_LATEST:false}
graph.duckpgq.force-install=${GRAPH_DUCKPGQ_FORCE_INSTALL:false}
graph.duckpgq.repository-url=${GRAPH_DUCKPGQ_REPOSITORY_URL:http://duckpgq.s3.eu-north-1.amazonaws.com}
