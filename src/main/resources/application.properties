spring.application.name=graph_api_v2

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:duckdb:./data/graph_local.db}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.duckdb.DuckDBDriver}
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:2}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:1}
spring.datasource.hikari.auto-commit=${SPRING_DATASOURCE_HIKARI_AUTO_COMMIT:true}
spring.datasource.hikari.data-source-properties.allow_unsigned_extensions=${SPRING_DATASOURCE_ALLOW_UNSIGNED_EXTENSIONS:true}

spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:true}
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:true}

graph.default-max-neighbors-per-seed=${GRAPH_DEFAULT_MAX_NEIGHBORS_PER_SEED:50}
graph.default-max-nodes=${GRAPH_DEFAULT_MAX_NODES:300}
graph.default-max-edges=${GRAPH_DEFAULT_MAX_EDGES:500}
graph.default-max-depth=${GRAPH_DEFAULT_MAX_DEPTH:6}
graph.default-relation-family=${GRAPH_DEFAULT_RELATION_FAMILY:ALL_RELATIONS}
graph.query-backend=${GRAPH_QUERY_BACKEND:DUCKPGQ}
graph.max-expand-candidate-edges=${GRAPH_MAX_EXPAND_CANDIDATE_EDGES:10000}
graph.hub-penalty-percent=${GRAPH_HUB_PENALTY_PERCENT:35}
graph.cors.allowed-origins=${GRAPH_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
graph.cors.allowed-methods=${GRAPH_CORS_ALLOWED_METHODS:GET,POST,OPTIONS}
graph.cors.allowed-headers=${GRAPH_CORS_ALLOWED_HEADERS:*}
graph.cors.max-age-seconds=${GRAPH_CORS_MAX_AGE_SECONDS:3600}

graph.duckpgq.enabled=${GRAPH_DUCKPGQ_ENABLED:true}
graph.duckpgq.auto-load=${GRAPH_DUCKPGQ_AUTO_LOAD:true}
graph.duckpgq.sync-graph-state-on-startup=${GRAPH_DUCKPGQ_SYNC_GRAPH_STATE_ON_STARTUP:true}
graph.duckpgq.prefer-latest=${GRAPH_DUCKPGQ_PREFER_LATEST:false}
graph.duckpgq.force-install=${GRAPH_DUCKPGQ_FORCE_INSTALL:false}
graph.duckpgq.repository-url=${GRAPH_DUCKPGQ_REPOSITORY_URL:http://duckpgq.s3.eu-north-1.amazonaws.com}

graph.neo4j.uri=${GRAPH_NEO4J_URI:bolt://localhost:7687}
graph.neo4j.username=${GRAPH_NEO4J_USERNAME:neo4j}
graph.neo4j.password=${GRAPH_NEO4J_PASSWORD:graph-api-password}
graph.neo4j.database=${GRAPH_NEO4J_DATABASE:neo4j}
graph.neo4j.sync-graph-state-on-startup=${GRAPH_NEO4J_SYNC_GRAPH_STATE_ON_STARTUP:true}
graph.neo4j.clear-projection-on-startup=${GRAPH_NEO4J_CLEAR_PROJECTION_ON_STARTUP:false}

graph.memgraph.uri=${GRAPH_MEMGRAPH_URI:bolt://localhost:7688}
graph.memgraph.username=${GRAPH_MEMGRAPH_USERNAME:}
graph.memgraph.password=${GRAPH_MEMGRAPH_PASSWORD:}
graph.memgraph.database=${GRAPH_MEMGRAPH_DATABASE:}
graph.memgraph.sync-graph-state-on-startup=${GRAPH_MEMGRAPH_SYNC_GRAPH_STATE_ON_STARTUP:true}
graph.memgraph.clear-projection-on-startup=${GRAPH_MEMGRAPH_CLEAR_PROJECTION_ON_STARTUP:false}

graph.postgres-age.jdbc-url=${GRAPH_POSTGRES_AGE_JDBC_URL:jdbc:postgresql://localhost:5433/graph_bench}
graph.postgres-age.username=${GRAPH_POSTGRES_AGE_USERNAME:graph}
graph.postgres-age.password=${GRAPH_POSTGRES_AGE_PASSWORD:graph-api-password}
graph.postgres-age.schema=${GRAPH_POSTGRES_AGE_SCHEMA:public}
graph.postgres-age.sync-graph-state-on-startup=${GRAPH_POSTGRES_AGE_SYNC_GRAPH_STATE_ON_STARTUP:true}
graph.postgres-age.clear-projection-on-startup=${GRAPH_POSTGRES_AGE_CLEAR_PROJECTION_ON_STARTUP:false}

graph.arango.endpoint=${GRAPH_ARANGO_ENDPOINT:http://localhost:8529}
graph.arango.database=${GRAPH_ARANGO_DATABASE:graph_bench}
graph.arango.username=${GRAPH_ARANGO_USERNAME:root}
graph.arango.root-password=${GRAPH_ARANGO_ROOT_PASSWORD:graph-api-password}
graph.arango.sync-graph-state-on-startup=${GRAPH_ARANGO_SYNC_GRAPH_STATE_ON_STARTUP:true}
graph.arango.clear-projection-on-startup=${GRAPH_ARANGO_CLEAR_PROJECTION_ON_STARTUP:false}

graph.janusgraph.host=${GRAPH_JANUSGRAPH_HOST:localhost}
graph.janusgraph.port=${GRAPH_JANUSGRAPH_PORT:8182}
graph.janusgraph.sync-graph-state-on-startup=${GRAPH_JANUSGRAPH_SYNC_GRAPH_STATE_ON_STARTUP:true}
graph.janusgraph.clear-projection-on-startup=${GRAPH_JANUSGRAPH_CLEAR_PROJECTION_ON_STARTUP:false}

graph.kuzu.path=${GRAPH_KUZU_PATH:data/graph_bench.kuzu}
graph.kuzu.sync-graph-state-on-startup=${GRAPH_KUZU_SYNC_GRAPH_STATE_ON_STARTUP:true}
graph.kuzu.clear-projection-on-startup=${GRAPH_KUZU_CLEAR_PROJECTION_ON_STARTUP:false}
