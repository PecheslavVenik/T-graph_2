spring.datasource.url=jdbc:duckdb:target/graph_test_${random.uuid}.db
spring.datasource.driver-class-name=org.duckdb.DuckDBDriver
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1

spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

graph.default-max-neighbors-per-seed=100
graph.default-max-nodes=1000
graph.default-max-edges=2000
graph.default-max-depth=6

graph.duckpgq.enabled=true
graph.duckpgq.force-fallback=true
