spring.datasource.url=jdbc:duckdb:target/graph_test_${random.uuid}.db
spring.datasource.driver-class-name=org.duckdb.DuckDBDriver
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

graph.default-max-neighbors-per-seed=25
graph.default-max-nodes=200
graph.default-max-edges=300
graph.default-max-depth=6
graph.query-backend=DUCKPGQ
graph.max-expand-candidate-edges=1000
graph.hub-penalty-percent=35

graph.duckpgq.enabled=true
graph.duckpgq.auto-load=true
graph.duckpgq.sync-graph-state-on-startup=true
